name: 株価テクニカル分析

on:
  schedule:
    # GitHub schedule は大幅遅延(数時間〜10時間)が起きる可能性がある。
    # 定時実行は外部スケジューラ(cron-job.org 等)から workflow_dispatch で行う。
    # ここは外部スケジューラが失敗した場合のフォールバックとして残す。
    - cron: '25 6 * * 1-5'  # 15:25 JST fallback
    - cron: '25 9 * * 1-5'  # 18:25 JST fallback
  workflow_dispatch:
    inputs:
      schedule_type:
        description: '実行種別: 15h=引け後速報(常時送信) / 18h=夕方レポート(マッチ時のみ) / manual=手動(メールなし)'
        required: false
        default: 'manual'
        type: choice
        options:
          - manual
          - 15h
          - 18h

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリインストール
        run: pip install yfinance pandas numpy

      - name: テクニカル分析実行
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL:  ${{ secrets.TO_EMAIL }}
          # schedule または外部スケジューラ(schedule_type=15h/18h)のみメール送信
          SEND_EMAIL: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.schedule_type != 'manual' && github.event.inputs.schedule_type != '')) && 'true' || 'false' }}
          # 15h は件数0でも必ず送信、18h はマッチあり時のみ
          SEND_EMAIL_ALWAYS: ${{ (github.event.schedule == '25 6 * * 1-5' || github.event.inputs.schedule_type == '15h') && 'true' || 'false' }}
          # schedule fallback 用タイムガード（外部 dispatch は TARGET_JST_HOUR 空 = ガードなし）
          TARGET_JST_HOUR: ${{ github.event.schedule == '25 6 * * 1-5' && '15' || github.event.schedule == '25 9 * * 1-5' && '18' || '' }}
          CUTOFF_JST_HOUR: '22'
        run: python scripts/analyze.py

      - name: 結果をコミット・プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/results.json data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stock analysis results $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git pull --rebase && git push
