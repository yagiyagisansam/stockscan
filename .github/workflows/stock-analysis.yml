name: 株価テクニカル分析

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 15:00 JST（市場引け）— 速報メール（常時送信）
    - cron: '0 9 * * 1-5'   # 18:00 JST（夕方）    — マッチ銘柄がある場合のみ送信
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリインストール
        run: pip install yfinance pandas numpy

      - name: テクニカル分析実行
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL:  ${{ secrets.TO_EMAIL }}
          SEND_EMAIL: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          # 15:00 JST の cron のみ SEND_EMAIL_ALWAYS=true（マッチなしでも必ず送信）
          SEND_EMAIL_ALWAYS: ${{ github.event.schedule == '0 6 * * 1-5' && 'true' || 'false' }}
        run: python scripts/analyze.py

      - name: 結果をコミット・プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/results.json data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stock analysis results $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git pull --rebase && git push
